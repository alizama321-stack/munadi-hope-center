<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Munadi Hope Center Book Lab</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='6' fill='%23210f08'/%3E%3Cpath d='M24 10v28M14 18h20' stroke='%23F1D27A' stroke-width='2.8' stroke-linecap='round'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/book-lab/book-lab.css" />
  </head>
  <body>
    <main class="book-lab-shell">
      <canvas id="bookLabCanvas"></canvas>

      <section class="lab-panel" aria-label="Book calibration controls">
        <p class="eyebrow">Munadi Hope Center</p>
        <h1>Book Lab</h1>
        <p class="lab-note">Isolated animated Bible calibration. Homepage files are untouched.</p>

        <div class="control-grid" id="controls">
          <label>
            Cover node
            <select id="coverTarget">
              <option value="cover-r_35">cover-r_35</option>
              <option value="cover-l_36" selected>cover-l_36</option>
            </select>
          </label>
          <label>
            Cover face
            <select id="coverFace">
              <option value="-1">front / top</option>
              <option value="1">back / underside</option>
            </select>
          </label>

          <div class="preset-row" aria-label="Camera presets">
            <button type="button" data-camera-preset="hero_view">Hero</button>
            <button type="button" data-camera-preset="cover_closeup">Cover</button>
            <button type="button" data-camera-preset="open_pages_view">Pages</button>
          </div>

          <label>Animation open <input id="animationProgress" type="range" min="0" max="1" step="0.001" value="0" /></label>
          <label>Sequence test <input id="sequenceProgress" type="range" min="0" max="1" step="0.001" value="0" /></label>

          <label>Decal X <input data-bind="decal.position.x" type="number" step="0.005" /></label>
          <label>Decal Y <input data-bind="decal.position.y" type="number" step="0.005" /></label>
          <label>Decal Z <input data-bind="decal.position.z" type="number" step="0.005" /></label>
          <label>Decal rot X <input data-bind="decal.rotation.x" type="number" step="1" /></label>
          <label>Decal rot Y <input data-bind="decal.rotation.y" type="number" step="1" /></label>
          <label>Decal rot Z <input data-bind="decal.rotation.z" type="number" step="1" /></label>
          <label>Decal scale X <input data-bind="decal.scale.x" type="number" step="0.01" /></label>
          <label>Decal scale Y <input data-bind="decal.scale.y" type="number" step="0.01" /></label>
        </div>

        <button class="print-button" id="printValues" type="button">Print final values</button>
        <p class="status" id="status">Loading animated book...</p>
      </section>

      <div class="page-overlay-test" id="pageOverlayTest" aria-hidden="true">
        <div class="page-text left-page">Hope begins here.</div>
        <div class="page-text right-page">You are welcome.</div>
      </div>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.181.2/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.181.2/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="/book-lab/book-lab.js"></script>
  </body>
</html>
